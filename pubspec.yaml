name: astra
description: ASTRA — Adaptive Signal Traffic Response Algorithm | Ambulance Driver App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Auth & Biometric
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Location & GPS
  geolocator: ^13.0.1

  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Permissions
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
